<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FullPOS Agent Console</title>
    <style>
      :root {
        --bg: #f4f6f8;
        --panel: #fff;
        --ink: #102033;
        --muted: #64748b;
        --line: #d8dee9;
        --accent: #0f766e;
        --blue: #2563eb;
        --danger: #b42318;
        --soft: #eef2f7;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--ink);
      }

      header {
        background: var(--panel);
        border-bottom: 1px solid var(--line);
      }

      .wrap {
        width: min(1280px, 100%);
        margin: 0 auto;
        padding: 18px;
      }

      .topbar, .row, .actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .topbar { justify-content: space-between; }
      .actions { flex-wrap: wrap; }
      h1, h2, h3 { margin: 0; letter-spacing: 0; }
      h1 { font-size: 23px; }
      h2 { font-size: 17px; margin-bottom: 12px; }
      h3 { font-size: 14px; }
      p { color: var(--muted); margin: 5px 0 0; }

      .pill {
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 13px;
        font-weight: 800;
        background: #dcfce7;
        color: #166534;
        white-space: nowrap;
      }

      main.wrap {
        display: grid;
        grid-template-columns: 380px minmax(0, 1fr);
        gap: 16px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
        min-width: 0;
      }

      .stack { display: grid; gap: 14px; }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }
      .span-2 { grid-column: span 2; }

      label {
        display: block;
        font-size: 12px;
        font-weight: 800;
        color: #334155;
        margin-bottom: 5px;
      }

      input, select, textarea {
        width: 100%;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        padding: 9px 10px;
        color: var(--ink);
        background: #fff;
        font: inherit;
      }

      textarea { min-height: 86px; resize: vertical; }

      button {
        border: 0;
        border-radius: 6px;
        padding: 9px 12px;
        font-weight: 800;
        cursor: pointer;
        background: var(--accent);
        color: #fff;
      }
      button.secondary { background: var(--blue); }
      button.ghost { background: var(--soft); color: #1e293b; }
      button.danger { background: var(--danger); }

      .layout {
        display: grid;
        grid-template-columns: 290px minmax(0, 1fr);
        gap: 14px;
        min-height: 620px;
      }

      .list {
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        background: #fbfdff;
      }

      .conversation {
        display: grid;
        gap: 4px;
        padding: 11px;
        border-bottom: 1px solid var(--line);
        cursor: pointer;
      }
      .conversation:hover, .conversation.active { background: #eaf3ff; }
      .conversation small { color: var(--muted); overflow-wrap: anywhere; }

      .chat {
        display: grid;
        grid-template-rows: auto minmax(420px, 1fr) auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        background: #f8fafc;
      }

      .chat-head {
        background: #fff;
        border-bottom: 1px solid var(--line);
        padding: 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
      }

      .messages {
        padding: 14px;
        overflow: auto;
        display: flex;
        flex-direction: column;
        gap: 9px;
      }

      .bubble {
        width: fit-content;
        max-width: min(720px, 86%);
        padding: 9px 11px;
        border-radius: 8px;
        background: #fff;
        border: 1px solid var(--line);
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }
      .bubble.out {
        align-self: flex-end;
        background: #dcfce7;
        border-color: #bbf7d0;
      }
      .bubble .meta {
        display: block;
        margin-top: 5px;
        font-size: 11px;
        color: var(--muted);
      }

      .chat-actions {
        padding: 12px;
        border-top: 1px solid var(--line);
        background: #fff;
      }

      .status {
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        font-size: 13px;
        color: #334155;
        background: #f8fafc;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 10px;
        max-height: 280px;
        overflow: auto;
      }

      @media (max-width: 1000px) {
        main.wrap, .layout { grid-template-columns: 1fr; }
      }
      @media (max-width: 640px) {
        .grid { grid-template-columns: 1fr; }
        .span-2 { grid-column: span 1; }
        .topbar { align-items: flex-start; flex-direction: column; }
        .bubble { max-width: 96%; }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap topbar">
        <div>
          <h1>FullPOS Agent Console</h1>
          <p>Control Meta WhatsApp, conversaciones y pausa del bot.</p>
        </div>
        <span id="health-pill" class="pill">Verificando...</span>
      </div>
    </header>

    <main class="wrap">
      <section class="panel stack">
        <div>
          <h2>Configuración</h2>
          <form id="config-form" class="grid">
            <div>
              <label>Meta Phone Number ID</label>
              <input id="metaPhoneNumberId" />
            </div>
            <div>
              <label>Modelo OpenAI</label>
              <input id="openaiModel" />
            </div>
            <div>
              <label>Respuestas automáticas</label>
              <select id="autoReplyEnabled">
                <option value="true">Activadas</option>
                <option value="false">Pausadas globalmente</option>
              </select>
            </div>
            <div>
              <label>Modo</label>
              <select id="responseMode">
                <option value="auto">Auto</option>
                <option value="text">Solo texto</option>
                <option value="audio">Siempre audio</option>
              </select>
            </div>
            <div>
              <label>Voz</label>
              <select id="ttsVoice">
                <option value="marin">Marin</option>
                <option value="cedar">Cedar</option>
                <option value="coral">Coral</option>
                <option value="alloy">Alloy</option>
                <option value="verse">Verse</option>
              </select>
            </div>
            <div>
              <label>Audio inteligente</label>
              <select id="smartAudioEnabled">
                <option value="true">Activado</option>
                <option value="false">Desactivado</option>
              </select>
            </div>
            <div>
              <label>Escribiendo</label>
              <select id="typingIndicatorEnabled">
                <option value="true">Activado</option>
                <option value="false">Desactivado</option>
              </select>
            </div>
            <div>
              <label>Delay humano</label>
              <input id="humanDelayMs" type="number" min="0" max="10000" step="100" />
            </div>
            <div>
              <label>Máx. respuesta corta</label>
              <input id="maxResponseChars" type="number" min="120" max="1200" />
            </div>
            <div>
              <label>Respuesta amplia</label>
              <input id="detailedResponseChars" type="number" min="600" max="1800" />
            </div>
            <div>
              <label>Corte mensajes largos</label>
              <input id="messageChunkChars" type="number" min="350" max="1200" />
            </div>
            <div>
              <label>Pausa entre partes</label>
              <input id="interMessageDelayMs" type="number" min="300" max="8000" step="100" />
            </div>
            <div>
              <label>Teléfono alerta humano</label>
              <input id="humanAlertNumber" />
            </div>
            <div>
              <label>Alertas humano</label>
              <select id="humanAlertEnabled">
                <option value="true">Activadas</option>
                <option value="false">Desactivadas</option>
              </select>
            </div>
            <div class="span-2">
              <label>Meta Callback URL</label>
              <input id="metaWebhookUrl" />
            </div>
            <div class="span-2">
              <label>Meta Verify Token</label>
              <input id="metaVerifyToken" />
            </div>
            <div class="span-2">
              <label>Resumen del negocio</label>
              <textarea id="businessSummary"></textarea>
            </div>
          </form>
          <div class="actions">
            <button type="submit" form="config-form">Guardar</button>
            <button id="refresh-status" class="ghost" type="button">Estado</button>
          </div>
        </div>

        <div>
          <h2>Prueba</h2>
          <form id="test-form" class="grid">
            <div>
              <label>Teléfono</label>
              <input id="testPhone" placeholder="18494290310" />
            </div>
            <div>
              <label>Mensaje</label>
              <input id="testMessage" placeholder="Quiero la demo" />
            </div>
          </form>
          <div class="actions">
            <button type="submit" form="test-form" class="secondary">Probar</button>
          </div>
          <div id="test-result" class="status" style="display:none; margin-top: 12px;"></div>
        </div>

        <div>
          <h2>Estado</h2>
          <div id="status" class="status">Cargando...</div>
        </div>
      </section>

      <section class="panel">
        <div class="topbar" style="margin-bottom:12px">
          <div>
            <h2>Conversaciones</h2>
            <p>Solo lectura de mensajes recibidos y respuestas del bot.</p>
          </div>
          <button id="refresh-conversations" class="ghost" type="button">Actualizar</button>
        </div>

        <div class="layout">
          <div id="conversation-list" class="list"></div>
          <div class="chat">
            <div class="chat-head">
              <div>
                <h3 id="chat-title">Selecciona una conversación</h3>
                <p id="chat-subtitle"></p>
              </div>
              <div class="actions">
                <input id="pauseMinutes" type="number" min="1" max="1440" value="30" style="width:86px" />
                <button id="pause-chat" class="danger" type="button">Pausar</button>
                <button id="resume-chat" class="ghost" type="button">Activar</button>
                <button id="send-demo-button" class="secondary" type="button">Botón demo</button>
                <input id="imageHint" placeholder="imagen ventas, owner..." style="width:160px" />
                <button id="send-image" class="ghost" type="button">Enviar imagen</button>
              </div>
            </div>
            <div id="messages" class="messages"></div>
            <div class="chat-actions">
              <div id="chat-status" class="status">Esperando selección...</div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script>
      const configIds = [
        'metaPhoneNumberId', 'openaiModel', 'autoReplyEnabled', 'humanDelayMs',
        'maxResponseChars', 'businessSummary', 'humanAlertNumber', 'humanAlertEnabled',
        'metaWebhookUrl', 'metaVerifyToken', 'responseMode', 'ttsVoice',
        'smartAudioEnabled', 'detailedResponseChars', 'typingIndicatorEnabled',
        'messageChunkChars', 'interMessageDelayMs'
      ];
      let selectedPhone = '';

      const $ = (id) => document.getElementById(id);
      const esc = (value) => String(value ?? '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
      }[char]));

      async function loadConfig() {
        const data = await (await fetch('/config')).json();
        configIds.forEach((id) => {
          const el = $(id);
          if (el) el.value = data[id] ?? '';
        });
        ['autoReplyEnabled', 'humanAlertEnabled', 'smartAudioEnabled', 'typingIndicatorEnabled']
          .forEach((id) => $(id).value = String(data[id] !== false));
      }

      async function loadStatus() {
        try {
          const data = await (await fetch('/status')).json();
          $('health-pill').textContent = data.ok ? 'Operativo' : 'Revisar';
          $('status').textContent = `Proveedor: Meta Cloud API
Auto-respuesta: ${data.config?.autoReplyEnabled ? 'activa' : 'pausada'}
Modo: ${data.config?.responseMode || 'auto'}
Audio inteligente: ${data.config?.smartAudioEnabled ? 'activo' : 'desactivado'}
Escribiendo: ${data.config?.typingIndicatorEnabled ? 'activo' : 'desactivado'}
Meta Phone ID: ${data.config?.metaPhoneNumberId || ''}
Callback: ${data.config?.metaWebhookUrl || ''}
Token verificación: ${data.config?.metaVerifyToken || ''}
Alerta humano: ${data.config?.humanAlertEnabled ? (data.config?.humanAlertNumber || 'sin número') : 'desactivada'}`;
        } catch (error) {
          $('health-pill').textContent = 'Sin conexión';
          $('status').textContent = error.message;
        }
      }

      async function loadConversations() {
        const data = await (await fetch('/conversations')).json();
        const rows = data.conversations || [];
        $('conversation-list').innerHTML = rows.length ? rows.map((row) => `
          <div class="conversation ${row.phone === selectedPhone ? 'active' : ''}" data-phone="${esc(row.phone)}">
            <strong>${esc(row.phone)} ${row.paused ? '· Pausado' : ''}</strong>
            <small>${esc(row.last?.direction === 'out' ? 'Bot: ' : 'Cliente: ')}${esc(row.last?.text || '')}</small>
            <small>${esc(row.last?.at || '')}</small>
          </div>
        `).join('') : '<div class="conversation"><small>No hay conversaciones registradas todavía.</small></div>';

        document.querySelectorAll('.conversation[data-phone]').forEach((item) => {
          item.addEventListener('click', () => selectConversation(item.dataset.phone));
        });
      }

      async function selectConversation(phone) {
        selectedPhone = phone;
        await loadConversations();
        const data = await (await fetch(`/conversations/${phone}/messages`)).json();
        $('chat-title').textContent = phone;
        $('chat-subtitle').textContent = data.paused ? `Pausado por ${Math.ceil(data.pauseSeconds / 60)} min` : 'Bot activo';
        $('messages').innerHTML = (data.messages || []).map((msg) => `
          <div class="bubble ${msg.direction === 'out' ? 'out' : ''}">
            ${esc(msg.text)}
            <span class="meta">${esc(msg.direction === 'out' ? 'Bot' : 'Cliente')} · ${esc(msg.type || 'text')} · ${esc(msg.at || '')}</span>
          </div>
        `).join('');
        $('messages').scrollTop = $('messages').scrollHeight;
        $('chat-status').textContent = data.paused ? 'Esta conversación está pausada.' : 'Esta conversación está activa.';
      }

      async function pauseSelected() {
        if (!selectedPhone) return;
        const minutes = Number($('pauseMinutes').value || 30);
        const data = await (await fetch(`/conversations/${selectedPhone}/pause`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ minutes })
        })).json();
        $('chat-status').textContent = data.ok ? `Bot pausado por ${minutes} minutos.` : `Error: ${data.error}`;
        await selectConversation(selectedPhone);
      }

      async function resumeSelected() {
        if (!selectedPhone) return;
        const data = await (await fetch(`/conversations/${selectedPhone}/resume`, { method: 'POST' })).json();
        $('chat-status').textContent = data.ok ? 'Bot reactivado para esta conversación.' : `Error: ${data.error}`;
        await selectConversation(selectedPhone);
      }

      async function sendDemoButton() {
        if (!selectedPhone) return;
        const data = await (await fetch(`/conversations/${selectedPhone}/send-demo-button`, { method: 'POST' })).json();
        $('chat-status').textContent = data.ok ? 'Botón de demo enviado.' : `Error: ${data.error || 'Meta no aceptó el envío'}`;
        await selectConversation(selectedPhone);
      }

      async function sendImage() {
        if (!selectedPhone) return;
        const data = await (await fetch(`/conversations/${selectedPhone}/send-image`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ hint: $('imageHint').value.trim() || 'fullpos imagen' })
        })).json();
        $('chat-status').textContent = data.ok ? `Imagen enviada: ${data.asset?.title || ''}` : `Error: ${data.error || 'Meta no aceptó la imagen'}`;
        await selectConversation(selectedPhone);
      }

      $('config-form').addEventListener('submit', async (event) => {
        event.preventDefault();
        const payload = { whatsappProvider: 'meta' };
        configIds.forEach((id) => {
          const value = $(id).value;
          payload[id] = ['humanDelayMs', 'maxResponseChars', 'detailedResponseChars', 'messageChunkChars', 'interMessageDelayMs'].includes(id)
            ? Number(value)
            : value.trim();
        });
        ['autoReplyEnabled', 'humanAlertEnabled', 'smartAudioEnabled', 'typingIndicatorEnabled']
          .forEach((id) => payload[id] = $(id).value === 'true');
        await fetch('/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        await loadStatus();
      });

      $('test-form').addEventListener('submit', async (event) => {
        event.preventDefault();
        $('test-result').style.display = 'block';
        $('test-result').textContent = 'Probando...';
        const data = await (await fetch('/test-message', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ telefono: $('testPhone').value.trim(), mensaje: $('testMessage').value.trim() })
        })).json();
        $('test-result').textContent = data.ok ? data.respuesta : `Error: ${data.error}`;
      });

      $('refresh-status').addEventListener('click', loadStatus);
      $('refresh-conversations').addEventListener('click', loadConversations);
      $('pause-chat').addEventListener('click', pauseSelected);
      $('resume-chat').addEventListener('click', resumeSelected);
      $('send-demo-button').addEventListener('click', sendDemoButton);
      $('send-image').addEventListener('click', sendImage);

      loadConfig().then(loadStatus).then(loadConversations);
      setInterval(loadConversations, 12000);
    </script>
  </body>
</html>
